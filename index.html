<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMOU GROUP | حصاد الإنجاز - Milestone Achieved</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --glass: rgba(255,255,255,.08);
  --border: rgba(255,255,255,.18);
  --text:#ffffff;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Tajawal",sans-serif;
  color:var(--text);

  background:
  linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.85)),
  url("black.jpg"),
  url("black.png");

  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  min-height:100vh;
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:var(--glass);
  border:1px solid var(--border);
  padding:14px;
  border-radius:18px;
  backdrop-filter:blur(14px);
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.brand img{width:45px}

.pageTitle{
  text-align:center;
}

.pageTitle h1{
  margin:0;
  font-size:22px;
  font-weight:800;
}

.branch{
  font-size:12px;
  opacity:.8;
}

.card{
  margin-top:25px;
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:20px;
  padding:25px;
  backdrop-filter:blur(14px);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
}

.btnLink{
  text-decoration:none;
  color:#fff;
  padding:25px;
  border-radius:18px;
  font-size:20px;
  font-weight:700;
  text-align:center;
  transition:.3s;
}

.btnLink small{
  display:block;
  font-size:14px;
  margin-top:5px;
  opacity:.85;
}

/* الوان الازرار */

.silver{
  background:linear-gradient(135deg,#cfd6dd,#9aa6b2);
}

.golden{
  background:linear-gradient(135deg,#f5c542,#b8860b);
}

.rosegold{
  background:linear-gradient(135deg,#d98c8c,#b76e79);
}

.black{
  background:linear-gradient(135deg,#111,#333);
}

.wood{
  background:linear-gradient(135deg,#8b5a2b,#5c3a1e);
}

.panoramic{
  background:linear-gradient(135deg,#1fa2ff,#0f4c81);
}

.btnLink:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 40px rgba(0,0,0,.5);
}

</style>
</head>

<body>

<div class="wrap">

<div class="topbar">

<div class="brand">
<img src="logo.png">
<div>
<div style="font-weight:800">SMOU GROUP</div>
<div style="font-size:12px;opacity:.8">Milestone Achieved</div>
</div>
</div>

<div class="pageTitle">
<h1>حصاد الإنجاز - Milestone Achieved</h1>
</div>

<div class="branch">UAE</div>

</div>

<div class="card">

<div class="grid">

<a class="btnLink silver" href="https://vedio-s.smougroup.com/">
الفضي
<small>Silver</small>
</a>

<a class="btnLink golden" href="https://vedio-g.smougroup.com/">
الذهبي
<small>Golden</small>
</a>

<a class="btnLink rosegold" href="https://vedio-r.smougroup.com/">
الروزجولد
<small>Rosegold</small>
</a>

<a class="btnLink black" href="https://vedio-b.smougroup.com/">
الأسود
<small>Black</small>
</a>

<a class="btnLink wood" href="https://vedio-w.smougroup.com/">
الخشبي
<small>Wooden</small>
</a>

<a class="btnLink panoramic" href="https://vedio-p.smougroup.com/">
البانورامي
<small>Panoramic</small>
</a>

</div>

</div>

</div>

</body>
</html>

<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMOU GROUP | حصاد الإنجاز - Milestone Achieved</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#050b14;
  --bg2:#0a1c33;
  --glass: rgba(255,255,255,.08);
  --border: rgba(255,255,255,.18);
  --text:#ffffff;
  --muted:rgba(255,255,255,.75);
  --hover: rgba(255,255,255,.14);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Tajawal",sans-serif;
  color:var(--text);
  background:
    radial-gradient(800px 400px at 20% 20%, rgba(0,150,255,.15), transparent 60%),
    linear-gradient(180deg,var(--bg1),var(--bg2));
  min-height:100vh;
}
.wrap{
  max-width:1100px;
  margin:auto;
  padding:20px;
}
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:15px;
  background:var(--glass);
  border:1px solid var(--border);
  padding:14px;
  border-radius:18px;
  backdrop-filter:blur(14px);
}
.brand{
  display:flex;
  align-items:center;
  gap:10px;
}
.brand img{
  width:45px;
}
.pageTitle{
  text-align:center;
  flex:1;
}
.pageTitle h1{
  margin:0;
  font-size:22px;
  font-weight:800;
}
.pageTitle .sub{
  margin-top:6px;
  font-size:13px;
  color:var(--muted);
}
.branch{
  font-size:12px;
  color:var(--muted);
}

.card{
  margin-top:20px;
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:20px;
  padding:24px;
  backdrop-filter:blur(14px);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:18px;
}

.linkCard{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-decoration:none;
  color:#fff;
  min-height:150px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.15);
  border-radius:20px;
  padding:22px 16px;
  transition:.3s;
  backdrop-filter:blur(10px);
  text-align:center;
}
.linkCard:hover{
  transform:translateY(-6px);
  background:var(--hover);
  box-shadow:0 18px 40px rgba(0,0,0,.35);
}
.linkCard .ar{
  font-size:22px;
  font-weight:800;
  margin-bottom:8px;
}
.linkCard .en{
  font-size:15px;
  font-weight:600;
  color:var(--muted);
  direction:ltr;
}
.linkCard .open{
  margin-top:14px;
  padding:8px 16px;
  border:1px solid rgba(255,255,255,.2);
  border-radius:12px;
  background:rgba(255,255,255,.08);
  font-size:13px;
  font-weight:700;
}

.footerNote{
  margin-top:20px;
  text-align:center;
  color:var(--muted);
  font-size:13px;
}

@media (max-width:700px){
  .topbar{
    flex-direction:column;
    text-align:center;
  }
  .brand{
    justify-content:center;
  }
  .branch{
    display:none;
  }
}
</style>
</head>

<body>
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <img src="logo.png" alt="SMOU GROUP Logo">
      <div>
        <div style="font-weight:800">SMOU GROUP</div>
        <div style="font-size:12px;color:var(--muted)">Milestone Achieved</div>
      </div>
    </div>

    <div class="pageTitle">
      <h1>حصاد الإنجاز - Milestone Achieved</h1>
      <div class="sub">اختر القسم المطلوب لعرض الفيديوهات</div>
    </div>

    <div class="branch">UAE</div>
  </div>

  <div class="card">
    <div class="grid">

      <a class="linkCard" href="https://vedio-s.smougroup.com/" target="_blank">
        <div class="ar">الفضي</div>
        <div class="en">Silver</div>
        <div class="open">فتح الصفحة</div>
      </a>

      <a class="linkCard" href="https://vedio-g.smougroup.com/" target="_blank">
        <div class="ar">الذهبي</div>
        <div class="en">Golden</div>
        <div class="open">فتح الصفحة</div>
      </a>

      <a class="linkCard" href="https://vedio-r.smougroup.com/" target="_blank">
        <div class="ar">الروزجولد</div>
        <div class="en">Rosegold</div>
        <div class="open">فتح الصفحة</div>
      </a>

      <a class="linkCard" href="https://vedio-b.smougroup.com/" target="_blank">
        <div class="ar">الأسود</div>
        <div class="en">Black</div>
        <div class="open">فتح الصفحة</div>
      </a>

      <a class="linkCard" href="https://vedio-w.smougroup.com/" target="_blank">
        <div class="ar">الخشبي</div>
        <div class="en">Wooden</div>
        <div class="open">فتح الصفحة</div>
      </a>

      <a class="linkCard" href="https://vedio-p.smougroup.com/" target="_blank">
        <div class="ar">البانورامي</div>
        <div class="en">Panoramic</div>
        <div class="open">فتح الصفحة</div>
      </a>

    </div>

    <div class="footerNote">
      SMOU GROUP © جميع الحقوق محفوظة
    </div>
  </div>

</div>
</body>
</html>
